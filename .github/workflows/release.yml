name: Release
run-name: "Release - ${{ github.event.release.tag_name || inputs.tag }}"

# Fires when release-plz publishes a new GitHub Release. Builds every
# platform artifact (Linux x86_64, Linux aarch64, macOS aarch64 DMG)
# and uploads them to the same Release. Each job uploads its own artifact via
# `gh release upload` so a failure in one platform doesn't block the
# others â€” the AUR-bin / Flatpak workflows poll for the assets they
# need.
#
# Flatpak builds live in release-flatpak.yml (same trigger).
#
# Exposed via workflow_dispatch so we can backfill an old tag if a
# job was added later, or rerun a failed build without cutting a
# new version.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. v0.3.0)'
        required: true
        type: string

jobs:
  linux-x86_64:
    name: Build x86_64 binary + upload to Release
    runs-on: ubuntu-24.04
    permissions:
      # gh release upload writes to the release assets.
      contents: write
    steps:
      - name: Resolve target tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building for tag=$TAG version=$VERSION"

      - name: Checkout source at tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libfontconfig-dev \
            libfreetype-dev \
            libgl-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libdbus-1-dev \
            libsecret-1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Bake macOS-style touch-to-stop into the prebuilt (hyprcorrect-bin) only:
      # vendored forks add the Wayland hold gesture so kinetic scroll stops on a
      # finger-rest. Source / crates.io builds omit this patch and degrade
      # gracefully (kanso reads a flag that's simply never written). Pinned by
      # rev. Drop once upstreamed â€” rust-windowing/winit#4585, emilk/egui#8223.
      - name: Bake in touchpad hold-to-stop (prebuilt only)
        run: |
          {
            echo ''
            echo '[patch.crates-io]'
            echo 'winit = { git = "https://github.com/jondkinney/winit-cohort", rev = "fe13b15a32f42d3e3ac4a8bb4ccfb7cf0eb5ff83" }'
            echo 'egui-winit = { git = "https://github.com/jondkinney/egui-winit-cohort", rev = "a94f78c2f403dacd0812a9f3384a510e71f96e38" }'
          } >> Cargo.toml

      - name: Build release binary
        env:
          # Strip workspace + cargo paths out of the binary so
          # backtraces don't carry the runner's directory layout
          # into the shipped artifact.
          RUSTFLAGS: --remap-path-prefix=${{ github.workspace }}=/build --remap-path-prefix=/home/runner/.cargo=/cargo
        run: cargo build --release --bin hyprcorrect

      - name: Stage prebuilt tarball
        id: stage
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          NAME="hyprcorrect-${VERSION}-x86_64"
          STAGE="$RUNNER_TEMP/$NAME"
          install -d "$STAGE"
          install -m755 target/release/hyprcorrect             "$STAGE/hyprcorrect"
          install -m644 packaging/hyprcorrect.desktop          "$STAGE/hyprcorrect.desktop"
          install -m644 README.md                              "$STAGE/README.md"
          install -m644 LICENSE-MIT                            "$STAGE/LICENSE-MIT"
          install -m644 LICENSE-APACHE                         "$STAGE/LICENSE-APACHE"
          # Ship the hicolor PNG ladder + scalable SVG, mirroring
          # what the AUR install drops under /usr/share/icons. The
          # PNGs are pre-rendered in-repo (see assets/icons/) so
          # consumers don't need rsvg-convert with our fonts to make
          # the icon resolve.
          install -Dm644 assets/icons/hicolor/scalable/apps/hyprcorrect.svg \
                        "$STAGE/icons/hicolor/scalable/apps/hyprcorrect.svg"
          for size in 16 22 24 32 48 64 128 256 512; do
            install -Dm644 "assets/icons/hicolor/${size}x${size}/apps/hyprcorrect.png" \
                          "$STAGE/icons/hicolor/${size}x${size}/apps/hyprcorrect.png"
          done
          TARBALL="$RUNNER_TEMP/$NAME.tar.gz"
          tar -C "$RUNNER_TEMP" -czf "$TARBALL" "$NAME"
          sha256sum "$TARBALL"
          echo "path=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.tag.outputs.tag }}" \
            "${{ steps.stage.outputs.path }}" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

  linux-aarch64:
    name: Build aarch64 binary + upload to Release
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - name: Resolve target tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building for tag=$TAG version=$VERSION"

      - name: Checkout source at tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libfontconfig-dev \
            libfreetype-dev \
            libgl-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libdbus-1-dev \
            libsecret-1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Bake macOS-style touch-to-stop into the prebuilt (hyprcorrect-bin) only â€”
      # see the x86_64 job above. Pinned by rev; drop once upstreamed
      # (rust-windowing/winit#4585, emilk/egui#8223).
      - name: Bake in touchpad hold-to-stop (prebuilt only)
        run: |
          {
            echo ''
            echo '[patch.crates-io]'
            echo 'winit = { git = "https://github.com/jondkinney/winit-cohort", rev = "fe13b15a32f42d3e3ac4a8bb4ccfb7cf0eb5ff83" }'
            echo 'egui-winit = { git = "https://github.com/jondkinney/egui-winit-cohort", rev = "a94f78c2f403dacd0812a9f3384a510e71f96e38" }'
          } >> Cargo.toml

      - name: Build release binary
        env:
          RUSTFLAGS: --remap-path-prefix=${{ github.workspace }}=/build --remap-path-prefix=/home/runner/.cargo=/cargo
        run: cargo build --release --bin hyprcorrect

      - name: Stage prebuilt tarball
        id: stage
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          NAME="hyprcorrect-${VERSION}-aarch64"
          STAGE="$RUNNER_TEMP/$NAME"
          install -d "$STAGE"
          install -m755 target/release/hyprcorrect             "$STAGE/hyprcorrect"
          install -m644 packaging/hyprcorrect.desktop          "$STAGE/hyprcorrect.desktop"
          install -m644 README.md                              "$STAGE/README.md"
          install -m644 LICENSE-MIT                            "$STAGE/LICENSE-MIT"
          install -m644 LICENSE-APACHE                         "$STAGE/LICENSE-APACHE"
          # Ship the hicolor PNG ladder + scalable SVG, mirroring
          # what the AUR install drops under /usr/share/icons. The
          # PNGs are pre-rendered in-repo (see assets/icons/) so
          # consumers don't need rsvg-convert with our fonts to make
          # the icon resolve.
          install -Dm644 assets/icons/hicolor/scalable/apps/hyprcorrect.svg \
                        "$STAGE/icons/hicolor/scalable/apps/hyprcorrect.svg"
          for size in 16 22 24 32 48 64 128 256 512; do
            install -Dm644 "assets/icons/hicolor/${size}x${size}/apps/hyprcorrect.png" \
                          "$STAGE/icons/hicolor/${size}x${size}/apps/hyprcorrect.png"
          done
          TARBALL="$RUNNER_TEMP/$NAME.tar.gz"
          tar -C "$RUNNER_TEMP" -czf "$TARBALL" "$NAME"
          sha256sum "$TARBALL"
          echo "path=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.tag.outputs.tag }}" \
            "${{ steps.stage.outputs.path }}" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

  macos-aarch64:
    name: Build aarch64 .app + DMG
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Resolve target tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building for tag=$TAG version=$VERSION"

      - name: Checkout source at tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Restore packaging tooling for tag backfill
        # workflow_dispatch can target a tag cut before packaging/macos/
        # landed (e.g. v0.4.0, where the macOS .app/DMG packaging arrived
        # in a later commit). The binary still builds from the tag's own
        # source; pull just the packaging scripts + macOS icon from the
        # ref this run was dispatched from so the package step can run.
        # No-op on a normal release whose tag already carries them.
        if: hashFiles('packaging/macos/package.sh') == ''
        run: |
          echo "packaging/macos absent at ${{ steps.tag.outputs.tag }}; restoring from ${{ github.sha }}"
          git fetch --depth 1 origin ${{ github.sha }}
          git checkout ${{ github.sha }} -- \
            packaging/macos \
            crates/hyprcorrect-ui/assets/icons/svg/hyprcorrect-macos.svg

      - name: Install packaging tools
        # create-dmg drives hdiutil + AppleScript to lay out the
        # drag-to-Applications window. librsvg gives us a clean
        # 1024px icon render from the source SVG.
        run: brew install create-dmg librsvg

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      # The macOS rubber-band scroll needs the cohort egui-winit/winit forks to
      # publish the un-collapsed trackpad scroll phase (kanso 0.1.5 reads it).
      # Same forks the Linux jobs bake in for the hold gesture; the phase code
      # is macOS-only. Source / crates.io builds omit this patch and the
      # `cohort-fork` feature below, falling back to the native ScrollArea.
      - name: Bake in cohort scroll forks (prebuilt only)
        run: |
          {
            echo ''
            echo '[patch.crates-io]'
            echo 'winit = { git = "https://github.com/jondkinney/winit-cohort", rev = "fe13b15a32f42d3e3ac4a8bb4ccfb7cf0eb5ff83" }'
            echo 'egui-winit = { git = "https://github.com/jondkinney/egui-winit-cohort", rev = "a94f78c2f403dacd0812a9f3384a510e71f96e38" }'
          } >> Cargo.toml

      - name: Build release binary
        env:
          RUSTFLAGS: --remap-path-prefix=${{ github.workspace }}=/build --remap-path-prefix=/Users/runner/.cargo=/cargo
        run: cargo build --release --bin hyprcorrect --target aarch64-apple-darwin --features cohort-fork

      - name: Stage binary at target/release for packager
        run: |
          mkdir -p target/release
          ln -sf "$PWD/target/aarch64-apple-darwin/release/hyprcorrect" target/release/hyprcorrect

      - name: Build .app bundle + DMG
        env:
          # Signing/notarization secrets, consumed by
          # packaging/macos/sign-and-notarize.sh. If any are unset
          # the script no-ops and the build falls back to ad-hoc
          # signing â€” useful for forks that haven't configured
          # secrets yet.
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
          HYPRCORRECT_SIGNING_PASSWORD: ${{ secrets.HYPRCORRECT_SIGNING_PASSWORD }}
        run: ./packaging/macos/package.sh

      - name: Verify bundle signature
        run: codesign --verify --verbose=2 target/macos/HyprCorrect.app

      - name: Locate DMG
        id: dmg
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          DMG="target/macos/HyprCorrect-${VERSION}-aarch64.dmg"
          if [ ! -f "$DMG" ]; then
            echo "error: $DMG not found" >&2
            ls -la target/macos/ >&2
            exit 1
          fi
          shasum -a 256 "$DMG"
          echo "path=$DMG" >> "$GITHUB_OUTPUT"

      - name: Upload DMG to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.tag.outputs.tag }}" \
            "${{ steps.dmg.outputs.path }}" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

