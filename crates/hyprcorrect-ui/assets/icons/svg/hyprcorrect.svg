<!-- Square 256×256 viewBox with intrinsic width/height — matches
     the vernier / mousehop / tensaku siblings. AppStream's icon
     validator (`appstreamcli compose`) rejects non-square SVG
     sources with `icon-file-read-error`, which broke the Flatpak
     build of v0.1.0 when this had a tighter cropped non-square
     viewBox. Intrinsic size also helps older toolkits / GtkImage
     paths that can't parse a viewBox alone. -->
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Adwaita-style spell-check mark: blue "Ab" with a squiggly
       underline. Transparent background so the icon picks up
       whichever surface it sits on (tray, prefs sidebar, launcher
       tile). -->
  <text x="128" y="178"
        font-family="DejaVu Serif, Liberation Serif, Noto Serif, Times New Roman, serif"
        font-size="190"
        font-weight="900"
        fill="#4a86c0"
        text-anchor="middle">Ab</text>
  <!-- Spell-check squiggle: 3 oscillations under the letters. -->
  <path d="M 14 224 q 19 -18 38 0 q 19 18 38 0 q 19 -18 38 0 q 19 18 38 0 q 19 -18 38 0 q 19 18 38 0"
        fill="none"
        stroke="#4a86c0"
        stroke-width="18"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
